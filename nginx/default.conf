server {

    listen 80;

    location / {

        proxy_pass http://frontend:5173;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

    }

    location /api/ {

        proxy_pass http://backend:8000/api/;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

    }

    location /media/ {

        proxy_pass http://backend:8000/media/;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

    }

}